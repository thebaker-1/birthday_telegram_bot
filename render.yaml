services:
  - type: web
    name: birthday-bot
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: REQUIRE_DATABASE
        value: true
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
